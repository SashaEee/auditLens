# ── Sravni через браузер (OpenClaw) — глубокое покрытие категорий с lazy-load
# Запускать при подключённом OPENCLAW_BROWSER_PROFILE; решать капчу из UI.
sravni_browser:
  adapter: bank_audit.sources.sravni_browser:SravniBrowserAdapter
  collector: browser
  targets:
    - { name: mortgage_browser, category: mortgage,
        filter_context: { amount: 6000000, period_months: 240, region: msk } }
    - { name: credits_browser, category: credit,
        filter_context: { amount: 500000, period_months: 36, region: msk } }
    - { name: cards_credit_browser, category: card_credit,
        filter_context: { region: msk } }
    - { name: cards_debit_browser, category: card_debit,
        filter_context: { region: msk } }
    - { name: auto_browser, category: auto_loan,
        filter_context: { amount: 500000, period_months: 60, region: msk } }
    - { name: brokers_browser, category: invest_broker,
        filter_context: { region: msk } }
    - { name: npf_browser, category: npf,
        filter_context: { region: msk } }


# ── Banki.ru: рейтинги банков (HTTP, без браузера) ────────────────────────────
banki_ratings:
  adapter: bank_audit.sources.banki_ratings:BankiRatingsAdapter
  collector: http
  targets:
    - name: all_banks_ratings
      url: "https://www.banki.ru/services/responses/ajax/?count=300&page=1"


# ── Отзывы: browser-collector с OPENCLAW_BROWSER_PROFILE ──────────────────────
banki_reviews:
  adapter: bank_audit.sources.banki_reviews:BankiReviewsAdapter
  collector: http
  targets:
    # max_pages: 10 даёт ~80 отзывов/банк, банки.ру не блокирует IP при таком темпе
    - { name: sber_reviews, url: "https://www.banki.ru/services/responses/bank/sberbank/", bank_slug: sberbank, max_pages: 10 }
    - { name: vtb_reviews,  url: "https://www.banki.ru/services/responses/bank/vtb/",      bank_slug: vtb,       max_pages: 10 }

sravni_reviews:
  adapter: bank_audit.sources.sravni_reviews:SravniReviewsAdapter
  collector: browser
  targets:
    - { name: sber_reviews, url: "https://www.sravni.ru/bank/sberbank/otzyvy/", bank_slug: sberbank }
    - { name: vtb_reviews,  url: "https://www.sravni.ru/bank/vtb/otzyvy/",      bank_slug: vtb }


