# ══════════════════════════════════════════════════════════════════════════════
# Источники данных bank_audit_platform.
#
# Реалистичные ограничения sravni.ru без браузера:
#   • POST /proxy-deposits/deposits — отдаёт top-15 по ставке. pageIndex/pageSize
#     игнорируются. Регион/сумма/срок РАБОТАЮТ — другой набор банков на регион.
#   • SSR /kredity/, /karty/, /avtokredity/, /ipoteka/ — top-7..15. ?page=N
#     НЕ работает (одни и те же items). Глубокое покрытие → только browser.
#   • /zaimy/ — отдаёт ~32 МФО за один запрос (микрозаймы — единственная
#     SSR-категория с относительно полной выдачей).
#
# Стратегия покрытия:
#   1. HTTP — быстрый top-N по нескольким регионам (вклады по 4-5 регионам).
#   2. Browser (sravni_browser) — глубокое покрытие через scroll + OpenClaw-профиль.
#   3. CBR registry — ground-truth список действующих банков для coverage.
# ══════════════════════════════════════════════════════════════════════════════


# ── ЦБ РФ: реестр БИК действующих банков ──────────────────────────────────────
cbr_registry:
  adapter: bank_audit.sources.cbr_registry:CBRRegistryAdapter
  collector: http
  targets:
    - name: cbr_bic_full
      url: "https://www.cbr.ru/scripts/XML_bic.asp"


# ── Sravni.ru HTTP (top-N по категориям + регион-ротация) ─────────────────────
sravni_api:
  adapter: bank_audit.sources.sravni_api:SravniApiAdapter
  collector: http
  targets:
    # ─── ВКЛАДЫ — POST API top-15 на (amount,region). Меняем регион ────────
    - { name: deposits_msk,  category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 100000, period_months: 12, region: msk } }
    - { name: deposits_spb,  category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 100000, period_months: 12, region: sankt-peterburg } }
    - { name: deposits_ekb,  category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 100000, period_months: 12, region: ekaterinburg } }
    - { name: deposits_nsk,  category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 100000, period_months: 12, region: novosibirsk } }
    - { name: deposits_kzn,  category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 100000, period_months: 12, region: kazan } }
    # Дополнительные суммы — иногда дают другой набор
    - { name: deposits_1m_msk, category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 1000000, period_months: 12, region: msk } }
    - { name: deposits_500k_24m_msk, category: deposit, page_size: 100, max_pages: 15,
        filter_context: { amount: 500000, period_months: 24, region: msk } }

    # ─── ПОТРЕБКРЕДИТЫ — SSR top-10 (page=N не работает) ──────────────────
    - { name: credits_msk, category: credit, max_pages: 1,
        filter_context: { amount: 500000, period_months: 36, region: msk } }
    - { name: credits_spb, category: credit, max_pages: 1,
        filter_context: { amount: 500000, period_months: 36, region: sankt-peterburg } }

    # ─── ИПОТЕКА — SSR top-7 (deep coverage только через browser) ─────────
    - { name: mortgage_msk, category: mortgage, max_pages: 1,
        filter_context: { amount: 6000000, period_months: 240, region: msk } }
    - { name: mortgage_spb, category: mortgage, max_pages: 1,
        filter_context: { amount: 6000000, period_months: 240, region: sankt-peterburg } }
    # Дополнительные срезы стоимости/регионов: SSR отдаёт top-N на срез —
    # разные cost дают другой набор программ (покрытие после чистки демо-сида)
    - { name: mortgage_msk_3m, category: mortgage, max_pages: 1,
        filter_context: { amount: 3000000, period_months: 240, region: msk } }
    - { name: mortgage_msk_12m, category: mortgage, max_pages: 1,
        filter_context: { amount: 12000000, period_months: 300, region: msk } }
    - { name: mortgage_ekb, category: mortgage, max_pages: 1,
        filter_context: { amount: 5000000, period_months: 240, region: ekaterinburg } }

    # ─── КАРТЫ — общая витрина /karty/, фильтр по type в парсере ──────────
    - { name: cards_credit_msk, category: card_credit, max_pages: 1,
        filter_context: { region: msk } }
    - { name: cards_debit_msk,  category: card_debit, max_pages: 1,
        filter_context: { region: msk } }
    - { name: cards_credit_spb, category: card_credit, max_pages: 1,
        filter_context: { region: sankt-peterburg } }
    - { name: cards_debit_spb,  category: card_debit, max_pages: 1,
        filter_context: { region: sankt-peterburg } }


    # ─── ПО-БАНКОВЫЕ СТРАНИЦЫ (аудит 23.07.2026): витрина отдаёт только top-N
    #     рынка, поэтому продукты ключевых банков собираем напрямую с их страниц
    #     sravni.ru/bank/<alias>/<раздел>/. Так в данные попадает, в частности,
    #     ипотека Сбера, которой нет в общей витрине.
    #     Вклады сюда НЕ входят: они собираются POST-API /proxy-deposits/, который
    #     игнорирует URL страницы — по-банковый таргет тянул бы всю витрину заново.
    - { name: bank_sber_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: sberbank-rossii, region: msk } }
    - { name: bank_sber_cred, category: credit, max_pages: 1,
        filter_context: { bank: sberbank-rossii, region: msk } }
    - { name: bank_sber_cc, category: card_credit, max_pages: 1,
        filter_context: { bank: sberbank-rossii, region: msk } }
    - { name: bank_vtb_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: vtb, region: msk } }
    - { name: bank_vtb_cred, category: credit, max_pages: 1,
        filter_context: { bank: vtb, region: msk } }
    - { name: bank_vtb_cc, category: card_credit, max_pages: 1,
        filter_context: { bank: vtb, region: msk } }
    - { name: bank_alfa_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: alfa-bank, region: msk } }
    - { name: bank_alfa_cred, category: credit, max_pages: 1,
        filter_context: { bank: alfa-bank, region: msk } }
    - { name: bank_alfa_cc, category: card_credit, max_pages: 1,
        filter_context: { bank: alfa-bank, region: msk } }
    - { name: bank_gpb_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: gazprombank, region: msk } }
    - { name: bank_gpb_cred, category: credit, max_pages: 1,
        filter_context: { bank: gazprombank, region: msk } }
    - { name: bank_gpb_cc, category: card_credit, max_pages: 1,
        filter_context: { bank: gazprombank, region: msk } }
    - { name: bank_rshb_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: rosselkhozbank, region: msk } }
    - { name: bank_rshb_cred, category: credit, max_pages: 1,
        filter_context: { bank: rosselkhozbank, region: msk } }
    - { name: bank_rshb_cc, category: card_credit, max_pages: 1,
        filter_context: { bank: rosselkhozbank, region: msk } }
    - { name: bank_tbank_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: t-bank, region: msk } }
    - { name: bank_tbank_cred, category: credit, max_pages: 1,
        filter_context: { bank: t-bank, region: msk } }
    - { name: bank_tbank_cc, category: card_credit, max_pages: 1,
