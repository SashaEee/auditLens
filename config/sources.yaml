    - { name: bank_mkb_ipo, category: mortgage, max_pages: 1,
        filter_context: { bank: moskovskij-kreditnyj-bank, region: msk } }
    - { name: bank_mkb_cred, category: credit, max_pages: 1,
        filter_context: { bank: moskovskij-kreditnyj-bank, region: msk } }
    - { name: bank_mkb_cc, category: card_credit, max_pages: 1,
