# Стартовые примеры лазеек для базы знаний модуля loophole.
# Поля: title / description / category. Загружается loophole.kb.seed.seed_examples.
# SQL — диалект Greenplum 6; уникальность не обеспечивается на уровне БД
# (без PK/UNIQUE), идемпотентность — app-level через count_examples().

examples:
  - title: Скрытые комиссии по кредиту
    description: >
      Банк не раскрывает полную стоимость кредита: комиссии за обслуживание
      счёта, выдачу средств и перевод вносятся в договор мелким шрифтом,
      что нарушает требование о раскрытии ПСК.
    category: hidden_fees

  - title: Отказ в выдаче вклада
    description: >
      Банк отказывает в выдаче вклада по первому требованию либо затягивает
      сроки выдачи, ссылаясь на внутренние регламенты, что противоречит
      ст. 837 ГК РФ и условиям договора вклада.
    category: deposit_violation

  - title: Навязанная страховка
    description: >
      При оформлении кредита банк обязывает заёмщика приобрести страховку
      от партнёрской страховой компании, угрожая отказом в кредите или
      повышением ставки, что является навязыванием дополнительных услуг.
    category: tied_insurance

  - title: Одностороннее изменение ставки по вкладу
    description: >
      Договор содержит условие о праве банка в одностороннем порядке
      снижать процентную ставку по вкладу без уведомления вкладчика,
      что нарушает ст. 838 ГК РФ.
    category: rate_change

  - title: Штраф за закрытие счёта
    description: >
      Банк удерживает комиссию или штраф при досрочном закрытии счёта/
      вклада, не предусмотренные законом и не раскрытые в тарифах,
      что ущемляет права потребителя.
    category: hidden_fees

  - title: Нарушение 161-ФЗ
    description: >
      Условия договора ущемляют права потребителя финансовой услуги
      вопреки Закону РФ от 07.02.1992 № 2300-1 (ЗоЗПП) и Положению
      Банка России № 716-У (161-ФЗ): право банка изменять тарифы
      в одностороннем порядке, ограничение ответственности.
    category: legal_violation

  - title: Вводящие в заблуждение формулировки
    description: >
      Реклама и договор содержат формулировки, вводящие потребителя
      в заблуждение относительно реальной ставки, сроков или комиссий
      (например, «ставка от 0,1%» без указания условий её применения).
    category: misleading

  - title: Комиссия за досрочное погашение
    description: >
      Банк взимает комиссию за досрочное погашение кредита, не раскрытую
      в ПСК и не предусмотренную ст. 810 ГК РФ, что ущемляет право
      заёмщика на досрочное погашение.
    category: hidden_fees

  - title: Навязанная страховка кредита
    description: >
      При выдаче кредита банк включает страховку в тело кредита без
      согласия заёмщика, увеличивая ПСК и сумму переплаты, что
      квалифицируется как навязывание услуг (ст. 16 ЗоЗПП).
    category: tied_insurance

  - title: Условная ставка по вкладу
    description: >
      Заявленная в рекламе ставка по вкладу достижима только при
      выполнении ряда условий (покупка страховки, оформление карты,
      траты по карте), которые не раскрыты в рекламе — вводящее
      в заблуждение предложение.
    category: misleading

  - title: Плата за переводы
    description: >
      Банк вводит скрытую комиссию за переводы между собственными
      счетами, не отражённую в тарифах на момент открытия счёта,
      изменяя тарифы задним числом.
    category: hidden_fees

  - title: Комиссия за снятие наличных
    description: >
      По дебетовой карте с «бесплатным обслуживанием» банк удерживает
      комиссию за снятие наличных в банкоматах других банков сверх
      лимита, не раскрытого в рекламе, что вводит в заблуждение.
    category: hidden_fees

  - title: Штраф за просрочку
    description: >
      Размер штрафа за просрочку платежа по кредиту несоразмерен
      нарушению (фиксированная сумма + повышенная ставка), что может
      признаваться несоразмерной неустойкой (ст. 333 ГК РФ).
    category: penalty

  - title: Одностороннее изменение тарифа
    description: >
      Договор предусматривает право банка в одностороннем порядке
      изменять тарифы в любой момент без уведомления клиента, что
      ущемляет права потребителя (ст. 16 ЗоЗПП, 161-ФЗ).
    category: rate_change

  - title: Отказ в реструктуризации
    description: >
      Банк отказывает в реструктуризации кредита при ухудшении
      финансового положения заёмщика без рассмотрения документов,
      что противоречит требованиям Банка России к работе с
      заёмщиками в трудной ситуации.
    category: legal_violation
