# Запуск: cd docker/searxng && docker compose up -d
# Тест:   curl 'http://localhost:8888/search?q=сбербанк&format=json' | jq .
services:
  searxng:
    image: searxng/searxng:latest
    container_name: auditlens-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - BASE_URL=http://localhost:8888/
      - INSTANCE_NAME=auditlens-searxng
